name: ssc-cis-mssql2014-1.0.0-1
title: MSSQL 2014 CIS Compliance
maintainer: DevOps Team
copyright: Internal
license: Proprietary
summary: InSpec profile for CIS Microsoft SQL Server 2014 compliance. CIS Benchmark Version v1.5.0.
version: 1.5.0
inspec_version: ">= 5.0"

inputs:
  - name: usernm
    description: MSSQL username (optional for Windows Auth)
    required: false

  - name: passwd
    description: MSSQL password (optional for Windows Auth)
    sensitive: true
    required: false

  - name: hostnm
    description: MSSQL host address
    value: localhost

  - name: port
    description: MSSQL port
    value: 1433

  - name: servicenm
    description: MSSQL service/instance name (optional)
    required: false
